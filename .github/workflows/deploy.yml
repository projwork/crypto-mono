# CI gate for the crypto-remittance monorepo.
#
# This workflow ONLY builds/typechecks both apps on every push and PR to main.
# It does NOT deploy: Render handles deployment automatically because both
# services have `autoDeploy: true` in render.yaml. When you merge to main, the
# CI here must pass, and Render independently rebuilds and redeploys.
#
# No repository secrets are required for this workflow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build API
        working-directory: api
        run: |
          npm install --include=dev
          npx prisma generate
          npm run build

      - name: Build Web
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://crypto-remittance-api.onrender.com
        run: |
          npm install --include=dev
          npm run build
